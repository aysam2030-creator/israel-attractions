name: Android Build (APK + AAB)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          echo "--- installed Capacitor:"
          npm ls @capacitor/cli @capacitor/core @capacitor/android || true

      - name: Build web bundle
        run: npm run build

      - name: Stage web bundle into Android assets
        run: |
          set -e
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          # Capacitor config for native runtime
          node -e "
            const c = require('./capacitor.config.ts'.replace('.ts',''));
          " 2>/dev/null || true
          # Write the runtime capacitor.config.json from the TS file
          cat > android/app/src/main/assets/capacitor.config.json <<'EOF'
          {
            "appId": "com.aysam.israelattractions",
            "appName": "Israel Attractions",
            "webDir": "dist",
            "server": { "androidScheme": "https" },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 1500,
                "backgroundColor": "#0a0e22",
                "androidScaleType": "CENTER_CROP",
                "showSpinner": false,
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "StatusBar": { "style": "DARK", "backgroundColor": "#0a0e22" },
              "Keyboard": { "resize": "body", "style": "DARK", "resizeOnFullScreen": true }
            }
          }
          EOF
          echo "--- assets staged:"
          ls -la android/app/src/main/assets/public | head -10
          echo "--- config:"
          cat android/app/src/main/assets/capacitor.config.json

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          echo "KEYSTORE_PATH=$(pwd)/android/app/release.keystore" >> $GITHUB_ENV

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build Release AAB (Play Store)
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload Release APK
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload Release AAB (for Play Store)
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
